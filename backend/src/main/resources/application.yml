spring:
  application:
    name: backend

  # H2 in-memory — swap for PostgreSQL/MySQL in prod
  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop   # use 'validate' or 'none' in prod
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 console — remove in prod
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    com.example: DEBUG
    org.springframework.web: INFO
